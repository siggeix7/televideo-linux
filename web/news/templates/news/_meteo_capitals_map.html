{% load l10n %}
<section class="italy-map italy-map--capitals" data-capitals-map aria-label="Mappa meteo dei capoluoghi di provincia italiani">
    <div class="italy-map__header">
        <h2 class="italy-map__title">Mappa meteo capoluoghi</h2>
        <p class="italy-map__subtitle">Tocca o seleziona un marker per temperatura e vento</p>
    </div>
    <div class="italy-map__body">
    <svg class="italy-map__svg italy-map__svg--capitals" viewBox="0 0 800 960" xmlns="http://www.w3.org/2000/svg" aria-label="Mappa interattiva dei capoluoghi italiani" role="img">
        <defs>
            <linearGradient id="sea-grad-capitals" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#082616" stop-opacity="0.68"/>
                <stop offset="100%" stop-color="#001105" stop-opacity="0.92"/>
            </linearGradient>
        </defs>

        <rect width="800" height="960" fill="url(#sea-grad-capitals)"/>

        <g class="italy-regions italy-regions--capitals" aria-hidden="true">
            {% for r in map_regions %}
            <path d="{{ r.path }}" fill="rgba(0,170,0,0.20)" stroke="rgba(0,255,0,0.44)" stroke-width="1.1" stroke-linejoin="round" class="italy-region italy-region--capitals"/>
            {% endfor %}
        </g>

        <g class="italy-labels italy-labels--capitals" pointer-events="none" aria-hidden="true">
            {% for r in map_regions %}
            <text x="{{ r.cx }}" y="{{ r.cy }}" text-anchor="middle" class="italy-label--capitals">{{ r.label_short }}</text>
            {% endfor %}
        </g>

        <g class="capital-markers-dots">
            {% for marker in weather_capital_markers %}
            <g class="capital-marker{% if not marker.available %} capital-marker--muted{% endif %}" tabindex="0" role="img" aria-label="{{ marker.aria_label }}" data-capital-marker="{{ marker.slug }}" data-source-label="{{ marker.source_label }}">
                <title>{{ marker.aria_label }}</title>
                <circle class="capital-marker__halo" cx="{{ marker.x|unlocalize }}" cy="{{ marker.y|unlocalize }}" r="18"/>
                <text class="capital-marker__glyph" x="{{ marker.x|unlocalize }}" y="{{ marker.emoji_y|unlocalize }}" text-anchor="middle">{{ marker.emoji }}</text>
            </g>
            {% endfor %}
        </g>

        <g class="capital-markers-cards">
            {% for marker in weather_capital_markers %}
            <g class="capital-marker__card" data-card-for="{{ marker.slug }}" transform="translate({{ marker.card_x|unlocalize }} {{ marker.card_y|unlocalize }})">
                <rect class="capital-marker__card-bg" width="{{ marker.card_width }}" height="{{ marker.card_height }}" rx="0"/>
                <text class="capital-marker__card-title" x="9" y="17">{{ marker.name }}</text>
                <text class="capital-marker__card-detail" x="9" y="34">{{ marker.detail }}</text>
            </g>
            {% endfor %}
        </g>
    </svg>
    </div>
    <script>
    (function(){
        document.querySelectorAll("[data-capitals-map]").forEach(function(map){
            var markerDots = Array.prototype.slice.call(map.querySelectorAll("[data-capital-marker]"));
            var cardsById = {};
            map.querySelectorAll("[data-card-for]").forEach(function(card){
                cardsById[card.getAttribute("data-card-for")] = card;
            });

            function clearMarkers(){
                markerDots.forEach(function(marker){ marker.classList.remove("is-active"); });
                Object.values(cardsById).forEach(function(card){ card.classList.remove("is-active"); });
            }

            function showCard(slug){
                var card = cardsById[slug];
                if (card) {
                    card.classList.add("is-active");
                }
            }

            function activate(markerDot){
                clearMarkers();
                var slug = markerDot.getAttribute("data-capital-marker");
                markerDot.classList.add("is-active");
                showCard(slug);
            }

            markerDots.forEach(function(marker){
                marker.addEventListener("click", function(event){
                    event.stopPropagation();
                    activate(marker);
                });
                marker.addEventListener("focus", function(){ activate(marker); });
                marker.addEventListener("blur", function(){ clearMarkers(); });
                marker.addEventListener("mouseenter", function(){
                    clearMarkers();
                    showCard(marker.getAttribute("data-capital-marker"));
                });
                marker.addEventListener("mouseleave", function(){ clearMarkers(); });
                marker.addEventListener("keydown", function(event){
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        activate(marker);
                    }
                    if (event.key === "Escape") {
                        clearMarkers();
                    }
                });
            });

            document.addEventListener("click", function(event){
                if (!map.contains(event.target)) clearMarkers();
            });
        });
    })();
    </script>
</section>
