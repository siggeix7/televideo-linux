{% load static %}
<!doctype html>
<html lang="{{ ui.html_lang }}">
<head>
    {% include "news/_head.html" with title_og=title %}
    <title>{{ code }} - {{ ui.site_name }}</title>
    <link rel="stylesheet" href="{% static 'news/styles.css' %}">
</head>
<body>
    <a href="#main" class="skip-link">{{ ui.back_home }}</a>
    <div class="page-shell">
        <header class="site-header">
            <div class="hero hero--compact">
                <div class="hero__copy">
                    <p class="eyebrow">{{ eyebrow }}</p>
                    <h1>{{ title }}</h1>
                    <p class="lede">{{ message }}</p>
                </div>
                <div class="seal" aria-hidden="true">{{ code }}</div>
            </div>
            <div class="topbar">
                {% include "news/_site_nav.html" %}
            </div>
        </header>
        <div id="main" class="center-actions">
            <a href="/" class="action-link">{{ ui.back_home }}</a>
        </div>
    </div>
    {% include "news/_footer.html" %}
</body>
</html>
