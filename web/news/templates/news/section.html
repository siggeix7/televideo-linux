{% extends "news/_section_base.html" %}

{% block section_content %}
<main class="section-stack">
    {% if data.cards %}
        <div class="content-grid">
        {% for card in data.cards %}
            {% include "news/_content_card.html" with card=card %}
        {% endfor %}
        </div>
    {% else %}
    <div class="empty-state">
        <h2>{{ ui.section_empty_title }}</h2>
        <p>{{ ui.section_empty_message }}</p>
    </div>
    {% endif %}
</main>
{% endblock %}
