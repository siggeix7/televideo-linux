<button class="site-nav__toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false" type="button">
    <span></span>
    <span></span>
    <span></span>
</button>
<nav class="site-nav" id="site-nav" aria-label="{{ ui.nav_label }}">
    {% for item in nav_items %}
        <a href="{{ item.url }}" class="site-nav__link{% if item.active %} is-active{% endif %}"{% if item.active %} aria-current="page"{% endif %}>{{ item.label }}</a>
    {% endfor %}
</nav>
<script>
(function(){
    var toggle = document.getElementById("nav-toggle");
    var nav = document.getElementById("site-nav");
    function closeNav() {
        if (!toggle || !nav) return;
        nav.classList.remove("is-open");
        toggle.classList.remove("is-active");
        toggle.setAttribute("aria-expanded", "false");
    }
    if (toggle && nav) {
        toggle.addEventListener("click", function(){
            var open = toggle.getAttribute("aria-expanded") === "true";
            toggle.setAttribute("aria-expanded", !open);
            nav.classList.toggle("is-open");
            toggle.classList.toggle("is-active");
        });
        nav.querySelectorAll("a").forEach(function(link){
            link.addEventListener("click", function(){
                closeNav();
            });
        });
        document.addEventListener("keydown", function(event){
            if (event.key === "Escape") closeNav();
        });
        document.addEventListener("click", function(event){
            if (!nav.classList.contains("is-open")) return;
            if (nav.contains(event.target) || toggle.contains(event.target)) return;
            closeNav();
        });
    }
})();
</script>
