<section class="italy-map" aria-label="{{ ui.italy_map_label|default:'Mappa meteo regioni italiane' }}">
    <div class="italy-map__header">
        <h2 class="italy-map__title">{{ ui.italy_map_title|default:'Mappa meteo Italia' }}</h2>
        <p class="italy-map__subtitle">{{ ui.italy_map_subtitle|default:'Clicca su una regione per il dettaglio meteo' }}</p>
    </div>
    <svg class="italy-map__svg" viewBox="0 0 800 960" xmlns="http://www.w3.org/2000/svg" aria-label="{{ ui.italy_map_label|default:'Mappa interattiva dell\'Italia' }}" role="img">
        <defs>
            <linearGradient id="sea-grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#0a2a1a" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#001a0a" stop-opacity="0.8"/>
            </linearGradient>
        </defs>

        <rect width="800" height="960" fill="url(#sea-grad)"/>

        <g class="italy-regions">
            {% for r in map_regions %}
            <a href="{{ r.url }}" aria-label="{{ r.label }}" class="italy-region-link">
                <title>{{ r.label }}</title>
                <path d="{{ r.path }}" fill="transparent" stroke="transparent" stroke-width="14" stroke-linejoin="round" class="italy-hitarea"/>
                <path d="{{ r.path }}" fill="rgba(0,170,0,0.28)" stroke="rgba(0,255,0,0.65)" stroke-width="1.2" stroke-linejoin="round" class="italy-region"/>
            </a>
            {% endfor %}
        </g>

        <g class="italy-labels" pointer-events="none">
            {% for r in map_regions %}
            <text x="{{ r.cx }}" y="{{ r.cy }}" text-anchor="middle" fill="rgba(0,255,0,0.88)" font-size="{{ r.font_size }}" font-weight="800" font-family="monospace" stroke="rgba(0,0,0,0.7)" stroke-width="0.6" paint-order="stroke fill">{{ r.label_short }}</text>
            {% endfor %}
        </g>
    </svg>
</section>
