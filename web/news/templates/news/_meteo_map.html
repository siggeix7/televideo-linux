<section class="italy-map" aria-label="{{ ui.italy_map_label|default:'Mappa meteo regioni italiane' }}">
    <div class="italy-map__header">
        <h2 class="italy-map__title">{{ ui.italy_map_title|default:'Mappa meteo Italia' }}</h2>
        <p class="italy-map__subtitle">{{ ui.italy_map_subtitle|default:'Clicca su una regione per il dettaglio meteo' }}</p>
    </div>
    <svg class="italy-map__svg" viewBox="0 0 380 510" xmlns="http://www.w3.org/2000/svg" aria-label="{{ ui.italy_map_label|default:'Mappa interattiva dell\'Italia' }}" role="img">
        <defs>
            <filter id="region-glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <linearGradient id="sea-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1f4d67" stop-opacity="0.42"/><stop offset="100%" stop-color="#0d2b3e" stop-opacity="0.58"/></linearGradient>
        </defs>

        <rect width="380" height="510" fill="url(#sea-grad)" rx="8"/>

        <text x="190" y="488" text-anchor="middle" fill="rgba(255,249,235,0.55)" font-size="9" font-family="var(--font-sans)">Mar Mediterraneo</text>

        <g class="italy-regions">
            {% for r in map_regions %}
            <a href="{{ r.url }}" aria-label="{{ r.label }}">
                <path d="{{ r.path }}" fill="rgba(0,170,0,0.35)" stroke="rgba(0,255,0,0.75)" stroke-width="1.5" stroke-linejoin="round" class="italy-region"/>
            </a>
            {% endfor %}
        </g>

        <g class="italy-labels" pointer-events="none">
            {% for r in map_regions %}
            <text x="{{ r.cx }}" y="{{ r.cy }}" text-anchor="middle" fill="rgba(255,249,235,0.92)" font-size="{{ r.font_size|default:'8' }}" font-weight="750" font-family="var(--font-sans)">{{ r.label_short }}</text>
            {% endfor %}
        </g>
    </svg>
</section>
