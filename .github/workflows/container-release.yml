name: Build and release container

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  container:
    name: Build Docker image
    runs-on: [self-hosted, linux]
    env:
      IMAGE_BASENAME: televideo-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-${GITHUB_SHA::12}"
          fi
          ARCHIVE="/tmp/${IMAGE_BASENAME}-${VERSION}.tar"
          echo "image=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        shell: bash
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            .

      - name: Push image
        shell: bash
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          docker push "${{ steps.meta.outputs.image }}:latest"

      - name: Save image archive in /tmp
        shell: bash
        run: docker save "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" -o "${{ steps.meta.outputs.archive }}"

      - name: Upload image archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: televideo-linux-container-${{ steps.meta.outputs.version }}
          path: ${{ steps.meta.outputs.archive }}
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.archive }}
          generate_release_notes: true
