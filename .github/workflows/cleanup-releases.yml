name: Cleanup old releases

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cleanup-releases.yml"

permissions:
  contents: write

jobs:
  cleanup:
    name: Delete old GitHub releases
    runs-on: ubuntu-latest
    env:
      KEEP_RELEASE_TAG: v0.5.0
    steps:
      - name: Delete old releases
        shell: python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          keep_tag = os.environ["KEEP_RELEASE_TAG"]
          base_url = f"https://api.github.com/repos/{repo}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def delete_release(release_id):
              req = urllib.request.Request(
                  f"{base_url}/releases/{release_id}",
                  headers=headers,
                  method="DELETE",
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  return response.status

          releases = []
          page = 1
          while True:
              batch = request_json(f"{base_url}/releases?per_page=100&page={page}")
              if not batch:
                  break
              releases.extend(batch)
              page += 1

          kept = [release for release in releases if release.get("tag_name") == keep_tag]
          if not kept:
              raise SystemExit(f"Release da conservare non trovata: {keep_tag}")

          deleted = []
          for release in releases:
              tag = release.get("tag_name")
              if tag == keep_tag:
                  continue
              status = delete_release(release["id"])
              if status != 204:
                  raise SystemExit(f"DELETE release {tag} ha restituito HTTP {status}")
              deleted.append(tag)

          print(f"Release conservata: {keep_tag}")
          print(f"Release eliminate: {len(deleted)}")
          for tag in deleted:
              print(f"- {tag}")
